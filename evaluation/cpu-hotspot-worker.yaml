apiVersion: apps/v1
kind: Deployment
metadata:
  name: cpu-hotspot-worker
  namespace: emojivoto
spec:
  replicas: 4
  selector:
    matchLabels:
      app: cpu-hotspot-worker
  template:
    metadata:
      labels:
        app: cpu-hotspot-worker
        evaluation-role: cpu-hotspot
    spec:
      nodeSelector:
        kubernetes.io/hostname: topo-cluster-worker
      containers:
      - name: burner
        image: busybox:1.36
        command:
        - sh
        - -c
        - |
          while true; do :; done
        resources:
          requests:
            cpu: "900m"
            memory: "64Mi"
          limits:
            cpu: "1000m"
            memory: "128Mi"
