apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-api
  template:
    metadata:
      annotations:
        linkerd.io/inject: enabled
      labels:
        app: telemetry-api
    spec:
      serviceAccountName: default
      containers:
      - name: api
        image: telemetry-api:latest
        imagePullPolicy: Never # Forces K8s to use the image you side-loaded via Kind
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-service
  namespace: default
spec:
  selector:
    app: telemetry-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
