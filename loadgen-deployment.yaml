apiVersion: apps/v1
kind: Deployment
metadata:
  name: loadgen
  namespace: default
spec:
  replicas: 10
  selector:
    matchLabels:
      app: loadgen
  template:
    metadata:
      labels:
        app: loadgen
    annotations:
      linkerd.io/inject: enabled
    spec:
      containers:
      - name: loadgen
        image: curlimages/curl:8.4.0
        command:
          - sh
          - -c
        args:
          - |
            while true; do
              curl -s http://web-svc.emojivoto.svc.cluster.local:80 >/dev/null &
              curl -s http://web-svc.emojivoto.svc.cluster.local:80/api/vote >/dev/null &
              curl -s http://web-svc.emojivoto.svc.cluster.local:80/api/list >/dev/null &
              sleep 0.1
            done